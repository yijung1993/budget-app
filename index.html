<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#9FB5C3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="記帳本">
  <link rel="manifest" href="manifest.json">
  <title>記帳本</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <style>
@font-face{font-family:'JFOpenHuninn';src:url('font/fenround.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'HuaKangMidRound';src:url('font/huakang-mid.TTC') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'HuaKangSuperRound';src:url('font/huakang-super.TTC') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'LiXian';src:url('font/grain.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'CuXian';src:url('font/bold.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
@font-face{font-family:'DanDanFree';src:url('font/egg.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --p:#C8A5A3;--p2:#D0B0B1;--p3:#C59390;
  --latte:#C59390;--latte2:#D0B0B1;
  --income:#7A9878;--expense:#B87878;
  --nec:#8890A8;--want:#B89860;
  --bg:#FFFFFF;--surface:#F9F3F2;
  --text:#3A2828;--text2:#907878;
  --border:#EDE0DC;--shadow:rgba(180,130,130,.06);
  --r:16px;--nb:66px;--safe:env(safe-area-inset-bottom,0px);
  --hdr-grad:linear-gradient(135deg,#C59390 0%,#C8A5A3 50%,#D0B0B1 100%);
  --font-family:'JFOpenHuninn','Nunito',-apple-system,'PingFang TC','Microsoft JhengHei UI',sans-serif;
}
html,body{height:100%}
body{font-family:var(--font-family);
  background:var(--bg);color:var(--text);max-width:1000px;margin:0 auto;
  min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
#app{min-height:100vh;padding-bottom:calc(var(--nb)+var(--safe)+14px)}

/* top bar */
.top-bar{display:none;background:var(--surface);border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:100;box-shadow:0 2px 14px var(--shadow)}
.tbi{max-width:1000px;margin:0 auto;height:62px;padding:0 28px;display:flex;align-items:center;gap:8px}
.top-logo{font-size:20px;font-weight:800;color:var(--p);margin-right:20px;white-space:nowrap}
.top-nav{display:flex;gap:4px;flex:1}
.tnb{padding:7px 14px;border:none;background:transparent;border-radius:10px;font-size:18px;
  font-weight:700;cursor:pointer;color:var(--text2);transition:all .18s;
  display:flex;align-items:center;gap:5px;font-family:inherit}
.tnb:hover{background:var(--bg);color:var(--text)}
.tnb.active{background:var(--p);color:white}

/* header */
.hdr{background:var(--hdr-grad);color:white}
.hdr-in{max-width:1000px;margin:0 auto;padding:12px 18px 16px}
.hdr h1{font-size:30px;font-weight:800;letter-spacing:-.3px}
.hdr .sub{font-size:13px;opacity:.82;margin-top:2px}
.hdr-row{display:flex;align-items:center;justify-content:space-between}
.sum-bar{background:rgba(255,255,255,.18);backdrop-filter:blur(12px);border-radius:var(--r);
  padding:12px 14px;margin-top:12px;display:grid;grid-template-columns:1fr 1fr 1fr}
.sum-item{text-align:center}
.sum-item .lbl{font-size:14px;opacity:.85;font-weight:500}
.sum-item .val{font-size:24px;font-weight:800;margin-top:2px}

/* content & card */
.content{padding:14px}
.card{background:var(--surface);border-radius:var(--r);padding:16px;margin-bottom:12px;
  border:1px solid rgba(240,217,192,.7);box-shadow:0 2px 10px var(--shadow)}
.card-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:12px}
.slabel{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;
  letter-spacing:.4px;margin-bottom:7px}

/* type toggle */
.type-toggle{display:flex;background:var(--bg);border-radius:12px;padding:3px;
  margin-bottom:14px;border:1px solid var(--border)}
.type-btn{flex:1;padding:10px;border:none;background:transparent;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--text2);font-family:inherit}
.type-btn.ai{background:var(--income);color:white;box-shadow:0 2px 8px rgba(80,150,120,.3)}
.type-btn.ae{background:var(--expense);color:white;box-shadow:0 2px 8px rgba(190,100,100,.3)}
.type-btn.at{background:var(--p);color:white;box-shadow:0 2px 8px rgba(160,130,100,.3)}

/* amount */
.amt-wrap{position:relative;margin-bottom:14px}
.amt-pre{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:26px;font-weight:700;color:var(--text2)}
.amt-input{width:100%;padding:14px 14px 14px 40px;font-size:36px;font-weight:800;
  border:2px solid var(--border);border-radius:12px;outline:none;
  color:var(--text);background:var(--bg);transition:border-color .2s;font-family:inherit}
.amt-input:focus{border-color:var(--p);background:white}

/* necessity */
.nec-row{display:flex;gap:8px;margin-bottom:14px}
.nec-btn{flex:1;padding:9px;border:2px solid var(--border);border-radius:10px;
  background:white;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;
  color:var(--text2);font-family:inherit}
.nec-btn.an{border-color:var(--nec);background:var(--nec);color:white}
.nec-btn.aw{border-color:var(--want);background:var(--want);color:white}
.nec-btn.au{border-color:var(--border);background:var(--bg);color:var(--text2)}

/* category grid */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.cat-btn{padding:9px 2px;border:2px solid var(--border);border-radius:10px;background:white;
  font-size:11px;cursor:pointer;text-align:center;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit}
.cat-btn .ci{font-size:20px;line-height:1}
.cat-btn.ac{border-color:var(--p);background:var(--p);color:white}

/* subcat row */
.subcat-row{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;
  scrollbar-width:none;padding-bottom:2px}
.subcat-row::-webkit-scrollbar{display:none}
.subcat-btn{padding:7px 13px;border-radius:20px;border:2px solid var(--border);
  background:white;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:all .18s;font-family:inherit;color:var(--text)}
.subcat-btn.as{border-color:var(--p);background:var(--p);color:white}

/* account picker */
.acc-row{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;
  scrollbar-width:none;padding-bottom:2px}
.acc-row::-webkit-scrollbar{display:none}
.acc-pill{padding:7px 13px;border-radius:20px;border:2px solid var(--border);
  background:white;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:all .18s;font-family:inherit;color:var(--text)}
.acc-pill.active{border-color:var(--acc-c,var(--p));background:var(--acc-c,var(--p));color:white}

/* form fields */
.form-row{display:flex;gap:8px;margin-bottom:14px}
.form-field{flex:1;min-width:0}
.form-field label{display:block;font-size:11px;font-weight:700;color:var(--text2);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-input{width:100%;padding:11px 12px;border:2px solid var(--border);border-radius:10px;
  font-size:15px;outline:none;background:var(--bg);color:var(--text);
  font-family:inherit;transition:border-color .2s}
.form-input:focus{border-color:var(--p);background:white}
input[type="date"].form-input{accent-color:var(--p);color-scheme:light;min-width:0;max-width:100%}
input[type="date"].form-input::-webkit-calendar-picker-indicator{opacity:.6;cursor:pointer}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px;max-height:140px;overflow-y:auto;
  padding:8px;background:var(--bg);border-radius:10px;border:1.5px solid var(--border);margin-bottom:14px}
.emoji-btn{font-size:22px;background:none;border:none;cursor:pointer;padding:3px 4px;
  border-radius:6px;line-height:1;transition:background .12s}
.emoji-btn:hover{background:var(--surface)}
.sw{width:44px;height:26px;border-radius:13px;cursor:pointer;flex-shrink:0;
  position:relative;transition:background .25s;border:none;padding:0}
.sw.on{background:var(--income)}.sw.off{background:var(--border)}
.sw::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;
  background:white;top:3px;transition:left .22s;box-shadow:0 1px 4px rgba(0,0,0,.18)}
.sw.on::after{left:21px}.sw.off::after{left:3px}
.eye-btn{background:transparent;border:none;cursor:pointer;font-size:20px;
  position:relative;line-height:1;padding:4px;color:white}
.eye-btn::after{content:'';position:absolute;left:8%;top:44%;width:84%;height:2.5px;
  background:white;transform:rotate(-35deg);display:none;border-radius:2px}
.eye-btn.off::after{display:block}
.emoji-btn.active{background:var(--border);outline:2px solid var(--p);border-radius:6px}
.icon-field{width:100%;padding:11px 12px;border:2px solid var(--border);border-radius:10px;
  background:var(--bg);font-size:20px;line-height:1;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:border-color .2s;font-family:inherit}
.icon-field:hover{border-color:var(--p)}

/* buttons */
.save-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--p3),var(--p));
  color:white;border:none;border-radius:12px;font-size:16px;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:inherit;
  box-shadow:0 3px 12px rgba(160,130,100,.3)}
.save-btn:active{opacity:.85;transform:translateY(1px)}
.save-btn.latte{background:linear-gradient(135deg,var(--latte),var(--latte2));
  box-shadow:0 3px 12px rgba(130,120,110,.25)}
.save-btn.green{background:linear-gradient(135deg,var(--income),#4A7860);
  box-shadow:0 3px 12px rgba(80,150,120,.25)}
.outline-btn{padding:9px 18px;border:2px solid var(--border);border-radius:10px;
  background:white;font-size:14px;font-weight:700;cursor:pointer;
  color:var(--text2);font-family:inherit;transition:all .18s}
.outline-btn:hover{border-color:var(--p);color:var(--p)}
.icon-btn{width:34px;height:34px;border:none;border-radius:9px;cursor:pointer;
  font-size:16px;font-family:inherit;display:flex;align-items:center;justify-content:center;
  transition:background .15s}
.icon-btn.edit{background:#F5ECEA;font-weight:900;letter-spacing:1px}.icon-btn.edit:hover{background:var(--border)}
.icon-btn.del{background:#FADADA}.icon-btn.del:hover{background:var(--expense);color:white}
.add-fab{display:flex;align-items:center;gap:6px;padding:9px 16px;border:2px dashed var(--border);
  border-radius:12px;background:transparent;font-size:14px;font-weight:700;cursor:pointer;
  color:var(--text2);font-family:inherit;transition:all .18s;width:100%;justify-content:center;margin-top:10px}
.add-fab:hover{border-color:var(--p);color:var(--p);background:rgba(240,146,74,.05)}

/* transaction item */
.tx-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.tx-item:last-child{border-bottom:none}
.tx-ico{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.tx-ico.income{background:#E8F5EA}
.tx-ico.expense{background:#F8ECEC}
.tx-ico.transfer{background:#F5EFED}
.tx-info{flex:1;min-width:0}
.tx-cat{font-size:15px;font-weight:700}
.tx-meta{font-size:15px;color:var(--text2);margin-top:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tx-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.nec-tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:12px;font-weight:700}
.nec-tag.n{background:#D8E4F0;color:#405880}
.nec-tag.w{background:#F0E8D0;color:#806020}
.acc-tag{display:inline-block;padding:2px 7px;border-radius:5px;font-size:12px;font-weight:600;
  background:#F5ECEA;color:var(--text2)}
.tx-amt{font-size:17px;font-weight:800;flex-shrink:0}
.tx-amt.income{color:var(--income)}
.tx-amt.expense{color:var(--expense)}
.tx-actions{display:flex;gap:5px;flex-shrink:0}
.del-btn{background:#F8ECEC;color:var(--expense);border:none;border-radius:8px;
  padding:7px 10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.del-btn:hover{background:var(--expense);color:white}

/* necessity mini (in day modal) */
.nec-mini{display:flex;gap:5px;margin-top:6px;padding:0 0 8px 58px}
.nec-mbtn{padding:4px 10px;border-radius:12px;border:1.5px solid var(--border);
  background:white;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;
  font-family:inherit;color:var(--text2)}
.nec-mbtn.an{border-color:var(--nec);background:var(--nec);color:white}
.nec-mbtn.aw{border-color:var(--want);background:var(--want);color:white}

/* emergency fund card */
.ef-card{background:linear-gradient(135deg,#FBF4F3,#F5ECEA);border-color:#E0CECC}
.ef-bal{font-size:38px;font-weight:800;margin:6px 0 4px}
.ef-bar-wrap{margin:8px 0}
.ef-hint{font-size:15px;color:var(--text2);margin-top:4px;line-height:1.5}

/* calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between}
.cal-nb{width:36px;height:36px;border:none;background:rgba(255,255,255,.22);border-radius:10px;
  font-size:20px;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center}
.cal-title-text{font-size:18px;font-weight:800;color:white}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:5px}
.wday{font-size:12px;color:var(--text2);font-weight:700;padding:4px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;grid-auto-rows:76px}
.cal-day{border-radius:10px;display:flex;flex-direction:column;align-items:center;
  justify-content:center;cursor:pointer;padding:4px 1px;min-height:48px;transition:background .15s}
.cal-day:active{opacity:.7}
.cal-day.empty{pointer-events:none}
.cal-day.today{background:var(--p)}
.cal-day.sun .cdn{color:var(--expense)}
.cal-day.sat .cdn{color:var(--nec)}
.cal-day.today .cdn,.cal-day.today .cda{color:white!important}
.cdn{font-size:14px;font-weight:700;line-height:1}
.cda{font-size:20px;color:var(--expense);font-weight:800;margin-top:6px;line-height:1;
  display:block;padding-top:10px;border-top:1.5px solid rgba(196,85,85,.28);width:80%;text-align:center;height:36px}
.cal-day.today .cda{border-top-color:rgba(255,255,255,.4)!important}

/* stats */
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-legend{flex:1;min-width:0}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.leg-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.leg-lbl{font-size:14px;flex:1}
.leg-val{font-size:14px;font-weight:800}
.bar-wrap{margin-bottom:12px}
.bar-lbl{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;font-weight:600}
.bar-bg{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .6s ease}
.bar-fill.ok{background:var(--income)}.bar-fill.warn{background:var(--want)}.bar-fill.over{background:var(--expense)}
.budget-note{font-size:12px;color:var(--text2);margin-top:3px;text-align:right}

/* sum modal */
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sum-metric{background:var(--bg);border-radius:12px;padding:13px;border:1px solid var(--border)}
.sum-metric .ml{font-size:12px;color:var(--text2);font-weight:700}
.sum-metric .mv{font-size:20px;font-weight:800;margin-top:4px}
.mv.i{color:var(--income)}.mv.e{color:var(--expense)}.mv.p{color:var(--p)}
.mv.n{color:var(--nec)}.mv.w{color:var(--want)}
.insight{background:linear-gradient(135deg,#FBF4F3,#F5ECEA);border-radius:12px;
  padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.insight .it{font-size:13px;font-weight:800;color:var(--p);margin-bottom:6px}
.insight p{font-size:14px;color:var(--text);line-height:1.6}

/* settings */
.stabs{display:flex;gap:8px;margin-bottom:16px}
.stab{flex:1;padding:10px;border:2px solid var(--border);border-radius:12px;
  background:white;font-size:14px;font-weight:700;cursor:pointer;text-align:center;
  transition:all .2s;color:var(--text2);font-family:inherit}
.stab.active{border-color:var(--p);background:var(--p);color:white}
.setting-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-ico{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:22px;flex-shrink:0}
.setting-info{flex:1;min-width:0}
.setting-name{font-size:16px;font-weight:700}
.setting-sub{font-size:13px;color:var(--text2);margin-top:2px}
.setting-actions{display:flex;gap:6px}
.color-swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.swatch{width:32px;height:32px;border-radius:50%;border:3px solid transparent;
  cursor:pointer;transition:transform .15s;flex-shrink:0}
.swatch.sel{border-color:var(--text);transform:scale(1.2)}
.swatch:hover:not(.sel){transform:scale(1.1)}
.type-chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.type-chip{padding:6px 13px;border:2px solid var(--border);border-radius:20px;background:white;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;font-family:inherit;color:var(--text2)}
.type-chip.active{border-color:var(--p);background:var(--p);color:white}

/* subcat list in settings modal */
.subcat-list{margin:4px 0 10px}
.subcat-row-item{display:flex;align-items:center;gap:8px;padding:7px 0;
  border-bottom:1px solid var(--border)}
.subcat-row-item:last-child{border-bottom:none}
.subcat-row-item .sn{flex:1;font-size:14px;font-weight:600}
.subcat-inline-form{display:flex;gap:6px;padding:8px 0;border-bottom:1px solid var(--border)}
.subcat-inline-form input{flex:1;padding:7px 10px;border:2px solid var(--border);
  border-radius:8px;font-size:14px;outline:none;background:var(--bg);font-family:inherit}
.subcat-inline-form input:focus{border-color:var(--p)}
.subcat-inline-form input.icon-inp{width:56px;flex:none}
.sm-btn{padding:7px 12px;border:none;border-radius:8px;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;background:var(--p);color:white}
.sm-btn.cancel{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}

/* history */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;border:2px solid var(--border);background:white;
  font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
.chip.ac{border-color:var(--p);background:var(--p);color:white}
.day-hdr{display:flex;justify-content:space-between;align-items:center;
  padding:3px 2px;margin-bottom:4px;font-size:13px;font-weight:700;color:var(--text2)}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(50,20,5,.45);z-index:100;display:flex;align-items:flex-end}
.modal{background:white;border-radius:var(--r) var(--r) 0 0;
  padding:16px 18px calc(18px + var(--safe));width:100%;max-height:82vh;overflow-y:auto;overflow-x:hidden;
  animation:slideUp .28s cubic-bezier(.32,.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:19px;font-weight:800;margin-bottom:14px}

let _idb=null;
function openIDB(){
  if(_idb)return Promise.resolve(_idb);
  return new Promise((res,rej)=>{
    const r=indexedDB.open('budget_ins_db',1);
    r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('pdfs'))e.target.result.createObjectStore('pdfs',{keyPath:'id'});};
    r.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    r.onerror=()=>rej(r.error);
  });
}
function idbPut(id,data,name){return openIDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('pdfs','readwrite');tx.objectStore('pdfs').put({id,data,name});tx.oncomplete=res;tx.onerror=()=>rej(tx.error);}));}
function idbGet(id){return openIDB().then(db=>new Promise((res,rej)=>{const r=db.transaction('pdfs','readonly').objectStore('pdfs').get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}));}
function idbDel(id){return openIDB().then(db=>new Promise((res,rej)=>{const tx=db.transaction('pdfs','readwrite');tx.objectStore('pdfs').delete(id);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);}));}

// ── SHARED ROOM ────────────────────────────────────────────────────────────
function genRoomCode(){
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length:6},()=>c[Math.floor(Math.random()*c.length)]).join('');
}
function _startBookListener(code,bookId){
  if(_roomListeners[code]){_roomListeners[code]();delete _roomListeners[code];}
  _roomListeners[code]=_db.collection('rooms').doc(code).onSnapshot(snap=>{
    if(!snap.exists)return;
    const d=snap.data();
    if(d.updatedBy===DEVICE_ID)return;
    const incoming=(d.txs||[]).map(t=>({...t,bookId}));
    state.txs=[...state.txs.filter(t=>t.bookId!==bookId),...incoming];
    save('budget_txs',state.txs);
    showToast('✓ 已同步對方的最新資料');
    renderApp();
  },()=>{});
}
async function createBookRoom(bookId){
  try{
    let code=genRoomCode();
    let snap=await _db.collection('rooms').doc(code).get();
    let t=0;while(snap.exists&&t<5){code=genRoomCode();snap=await _db.collection('rooms').doc(code).get();t++;}
    const book=(state.books||[]).find(b=>b.id===bookId);
    if(!book)return;
    const txs=state.txs.filter(t=>t.bookId===bookId).map(({bookId:_bd,...t})=>t);
    await _db.collection('rooms').doc(code).set({
      bookName:book.name,txs,updatedBy:DEVICE_ID,updatedAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    const idx=(state.books||[]).findIndex(b=>b.id===bookId);
    if(idx>=0)state.books[idx]={...state.books[idx],roomCode:code};
    saveAll();state.editForm={...state.editForm,roomCode:code};
    _startBookListener(code,bookId);
    showToast('房間碼已建立 ✓');renderApp();
  }catch(e){showToast('建立失敗，請確認網路連線');}
}
async function joinBookRoom(code){
  code=(code||'').toUpperCase().replace(/\s/g,'');
  if(code.length!==6){showToast('請輸入 6 位房間碼');return;}
  try{
    const snap=await _db.collection('rooms').doc(code).get();
    if(!snap.exists){showToast('找不到此房間，請確認房間碼');return;}
    const d=snap.data();
    const existing=(state.books||[]).find(b=>b.roomCode===code);
    const bookId=existing?existing.id:('bk_'+code);
    if(!existing){
      const newBook={id:bookId,name:d.bookName||'共同帳本',icon:'👥',
        type:'shared',currency:'TWD',isDefault:false,isArchived:false,
        createdAt:todayStr(),roomCode:code};
      state.books=[...(state.books||[]),newBook];
    }
    const incoming=(d.txs||[]).map(t=>({...t,bookId}));
    state.txs=[...state.txs.filter(t=>t.bookId!==bookId),...incoming];
    state.activeBook=bookId;
    saveAll();
    _startBookListener(code,bookId);
    state.modal=null;showToast('已加入共同帳本 ✓');renderApp();
  }catch(e){showToast('加入失敗，請確認網路連線');}
}
function leaveBookRoom(bookId){
  const book=(state.books||[]).find(b=>b.id===bookId);
  if(!book||!book.roomCode)return;
  if(!confirm('確定退出共同帳本？退出後本機帳本資料仍保留。'))return;
  const code=book.roomCode;
  if(_roomListeners[code]){_roomListeners[code]();delete _roomListeners[code];}
  const idx=(state.books||[]).findIndex(b=>b.id===bookId);
  if(idx>=0)delete state.books[idx].roomCode;
  if(state.activeBook===bookId)state.activeBook='all';
  saveAll();state.modal=null;showToast('已退出共同帳本');renderApp();
}

function todayStr(){return new Date().toISOString().split('T')[0]}
function fmt(n){return Math.abs(n).toLocaleString('zh-TW')}
function fmtS(n){return(n>=0?'+':'-')+'$'+fmt(n)}
function getCat(type,id){
  return(type==='income'?state.cats.income:state.cats.expense).find(c=>c.id===id)||{name:id,icon:'📌',budget:0,subcats:[]};
}
function getSubCat(cat,subId){return cat.subcats?.find(s=>s.id===subId)||null}
function getAcc(id){return state.accounts.find(a=>a.id===id)||{name:'',icon:'💰',color:'#F0924A',init:0}}
function monthTxs(y,m){
  return state.txs.filter(t=>{const d=new Date(t.date);return d.getFullYear()===y&&d.getMonth()===m;});
}
function calcSum(txs){
  const ops=txs.filter(t=>t.type!=='transfer');
  const income=ops.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=ops.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const nec=ops.filter(t=>t.necessity==='必要').reduce((s,t)=>s+t.amount,0);
  const want=ops.filter(t=>t.necessity==='想要').reduce((s,t)=>s+t.amount,0);
  return{income,expense,nec,want,balance:income-expense};
}
function accBalance(id){
  const acc=getAcc(id);
  return(acc.init||0)+state.txs.reduce((s,t)=>{
    if(t.type==='transfer'){
      if(t.fromAccountId===id)return s-t.amount;
      if(t.toAccountId===id)return s+t.amount;
      return s;
    }
    if(t.accountId!==id)return s;
    return t.type==='income'?s+t.amount:s-t.amount;
  },0);
}
function calcEFTarget(){
  const n=new Date();let total=0,cnt=0;
  for(let i=1;i<=3;i++){
    let y=n.getFullYear(),m=n.getMonth()-i;
    if(m<0){m+=12;y--;}
    const exp=monthTxs(y,m).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
    if(exp>0){total+=exp;cnt++;}
  }
  return cnt>0?(total/cnt)*6:0;
}
function relDate(ds){
  const d=new Date(ds+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
  const diff=Math.round((t-d)/86400000);
  if(diff===0)return'今天';if(diff===1)return'昨天';
  const dd=new Date(ds+'T00:00:00');return`${dd.getMonth()+1}/${dd.getDate()}`;
}
function offsetDate(off){const d=new Date();d.setDate(d.getDate()+off);return d.toISOString().split('T')[0]}
function showToast(msg){
  const old=document.querySelector('.toast');if(old)old.remove();
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2500);
}

function addTx(){
  const amt=parseFloat(state.form.amount);
  if(!amt||amt<=0){showToast('請輸入正確金額');return;}
  const acc=getAcc(state.form.accountId);
  const n=acc.type==='credit'&&state.form.type==='expense'?(parseInt(state.form.installment)||0):0;
  if(n>=2){
    const per=Math.floor(amt/n);
    const baseDate=new Date(state.form.date+'T00:00:00');
    const baseNote=state.form.note.trim();
    for(let i=0;i<n;i++){
      const tm=baseDate.getMonth()+i;
      const yn=baseDate.getFullYear()+Math.floor(tm/12),mn=((tm%12)+12)%12;
      const maxD=new Date(yn,mn+1,0).getDate();
      const dd=Math.min(baseDate.getDate(),maxD);
      const ds=`${yn}-${String(mn+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
      const monthAmt=i===0?amt-per*(n-1):per;
      state.txs.unshift({
        id:`${Date.now()}-${i}-${Math.random().toString(36).slice(2)}`,
        date:ds,type:state.form.type,necessity:null,
        category:state.form.category,subCategory:state.form.subCategory||null,
        amount:monthAmt,
        note:baseNote?`${baseNote} · 分${n}期第${i+1}期`:`分${n}期第${i+1}期`,
        accountId:state.form.accountId,
        bookId:state.form.bookId||(state.books||[]).find(b=>b.isDefault)?.id||'default',
      });
    }
    saveAll();state.form=defaultForm();state.modal=null;showToast(`已拆為 ${n} 筆分期記錄 ✓`);renderApp();
  } else {
    state.txs.unshift({
      id:Date.now()+Math.random().toString(36).slice(2),
      date:state.form.date,type:state.form.type,necessity:null,
      category:state.form.category,subCategory:state.form.subCategory||null,
      amount:amt,note:state.form.note.trim(),accountId:state.form.accountId,
      bookId:state.form.bookId||(state.books||[]).find(b=>b.isDefault)?.id||'default',
    });
    saveAll();state.form=defaultForm();state.modal=null;showToast('已儲存 ✓');renderApp();
  }
}

  };

function getInstallmentInfo(tx){
  const m=(tx.note||'').match(/^(.*?)(?:\s*·\s*)?分(\d+)期第\d+期$/);
  if(!m)return null;
  return{baseNote:m[1].trim(),total:parseInt(m[2])};
}
function findRelatedInstallments(tx){
  const info=getInstallmentInfo(tx);if(!info)return null;
  const related=state.txs.filter(t=>{
    const ti=getInstallmentInfo(t);if(!ti)return false;
    return ti.baseNote===info.baseNote&&ti.total===info.total&&t.accountId===tx.accountId&&t.category===tx.category&&t.type===tx.type;
  });
  return related.length>1?related:null;
}
function deleteTx(id){
  const tx=state.txs.find(t=>t.id===id);if(!tx)return;
  const related=findRelatedInstallments(tx);
  if(related){
    if(!confirm(`此筆為分期消費，刪除後將一併刪除全部 ${related.length} 期記錄，確定刪除？`))return;
    const ids=new Set(related.map(t=>t.id));
    state.txs=state.txs.filter(t=>!ids.has(t.id));
  }else{
    if(!confirm('確定刪除這筆記錄？'))return;
    state.txs=state.txs.filter(t=>t.id!==id);
  }
  saveAll();state.modal=null;renderApp();
}

function processFixedExpenses(){
  const today=todayStr();let created=0;
  state.fixedExpenses.forEach(f=>{
    if(f.active===false||!f.nextDate)return;
    let iter=0;
    while(f.nextDate<=today&&iter<36){
      iter++;
      if(!state.txs.some(t=>t.fixedId===f.id&&t.date===f.nextDate)){
        state.txs.unshift({
          id:'fx_'+f.id+'_'+f.nextDate.replace(/-/g,''),
          date:f.nextDate,type:'expense',necessity:null,
          category:f.catId||'other_e',subCategory:null,
          amount:f.amount,note:f.name,
          accountId:f.accountId||state.accounts[0]?.id||'',
          fixedId:f.id,
        });
        created++;
      }
      const d=new Date(f.nextDate+'T00:00:00');
      if(f.frequency==='monthly')d.setMonth(d.getMonth()+1);
      else if(f.frequency==='quarterly')d.setMonth(d.getMonth()+3);
      else d.setFullYear(d.getFullYear()+1);
      f.nextDate=d.toISOString().split('T')[0];
    }
  });
  if(created>0){saveAll();}
  return created;
}

  if(!confirm('確定刪除此固定費用？'))return;
  state.fixedExpenses=state.fixedExpenses.filter(x=>x.id!==id);
  saveAll();renderApp();
}

function insStatus(ins){
  if(ins.suspended)return{label:'已停效',cls:'expired'};
  const now=new Date();now.setHours(0,0,0,0);
  if(ins.endDate){const e=new Date(ins.endDate+'T00:00:00');if(e<now)return{label:'已到期',cls:'expired'};const d=Math.round((e-now)/86400000);if(d<=30)return{label:`${d}天後到期`,cls:'expiring'};}

  if(ins.startDate&&new Date(ins.startDate+'T00:00:00')>now)return{label:'未生效',cls:'expiring'};

function loadSheetJs(){
  return new Promise(res=>{
    if(window.XLSX){res(window.XLSX);return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX);
    document.head.appendChild(s);
  });
}
function xlsxColMap(h){
  h=String(h).trim();
  if(/公司名稱|公司|承保/.test(h))return'company';
  if(/商品名稱/.test(h))return'name';
  if(/保單號碼|保單號|編號|契約號/.test(h))return'policyNo';
  if(/主.附約/.test(h))return'riderType';
  if(/險種分類|險種類別/.test(h))return'type';
  if(/險種名稱/.test(h))return'insTypeName';
  if(/電子.紙本/.test(h))return null;
  if(/關係人|被保|要保/.test(h))return'insured';
  if(/保險金額/.test(h))return'coverageAmt';
  if(/契約生效|生效日|起保|起始/.test(h))return'startDate';
  if(/繳費年期|繳費期/.test(h))return'premYears';
  if(/保費繳別|繳別|繳費方式/.test(h))return'premFreq';
  if(/狀態/.test(h))return'policyStatus';
  if(/到期|終止|屆滿|期滿/.test(h))return'endDate';
  if(/繳費日|下次|續期/.test(h))return'renewalDate';
  if(/保障|保額|說明|備註|摘要/.test(h))return'coverage';
  return null;
}
function xlsxTypeMap(v){
  v=String(v);
  if(/壽/.test(v))return'壽險';
  if(/醫療|健康|住院/.test(v))return'醫療險';
  if(/意外|傷害/.test(v))return'意外險';
  if(/車/.test(v))return'車險';
  if(/產/.test(v))return'產險';
  if(/投資|儲蓄|年金|利率/.test(v))return'壽險';
  return'其他';
}
function xlsxFreqMap(v){
  v=String(v);
  if(/半年/.test(v))return'semi';
  if(/季/.test(v))return'quarterly';
  if(/月/.test(v))return'monthly';
  return'yearly';
}
function xlsxNum(v){if(typeof v==='number')return v;return parseFloat(String(v).replace(/[,，$NT\s元]/g,''))||0;}
function xlsxDate(v){
  if(!v&&v!==0)return'';
  if(v instanceof Date)return v.toISOString().split('T')[0];
  const s=String(v).trim();
  const roc=s.match(/^(\d{2,3})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
  if(roc){const yr=parseInt(roc[1])<500?parseInt(roc[1])+1911:parseInt(roc[1]);return`${yr}-${roc[2].padStart(2,'0')}-${roc[3].padStart(2,'0')}`;}
  const iso=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(iso)return`${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  return'';
}
function importInsDetailFormat(rows,headers){
  const ci=name=>headers.findIndex(h=>new RegExp(name).test(h));
  const iCo=ci('公司'),iRi=ci('主.附'),iNa=ci('商品名稱'),iSt=ci('狀態');
  const iIn=ci('被保|要保'),iDt=ci('契約生效'),iLb=ci('理賠.給付項目'),iAm=ci('理賠金額');
  let curCo='',curIns=null;
  const policies=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];
    if(iCo>=0&&r[iCo])curCo=String(r[iCo]).trim();
    const name=iNa>=0&&r[iNa]?String(r[iNa]).trim():'';
    if(name){
      if(curIns)policies.push(curIns);
      const status=iSt>=0?String(r[iSt]||'').trim():'';
      curIns={
        id:'ins_'+(Date.now()+i)+'_'+Math.random().toString(36).slice(2,6),
        company:curCo,
        riderType:iRi>=0?String(r[iRi]||'').trim():'',
        name,policyStatus:status,
        insured:iIn>=0?String(r[iIn]||'').trim():'',
        startDate:iDt>=0?xlsxDate(r[iDt]):'',
        type:xlsxTypeMap(name),premFreq:'yearly',premium:0,
        policyNo:'',endDate:'',renewalDate:'',coverage:'',pdfId:null,pdfName:'',
        coverageItems:[],suspended:status&&!/生效|有效/.test(status)
      };
    }
    const label=iLb>=0&&r[iLb]?String(r[iLb]).trim():'';
    if(label&&curIns){
      curIns.coverageItems.push({
        label,
        amount:iAm>=0&&r[iAm]?String(r[iAm]).trim():'',
      });
    }
  }
  if(curIns)policies.push(curIns);
  const count=policies.length;
  if(count>0){state.insurances.push(...policies);save('budget_insurances',state.insurances);showToast(`成功匯入 ${count} 筆保單 ✓`);renderApp();}
  else showToast('未找到有效的保單資料');
  return count;
}
async function importInsFromXlsx(buf){
  const XL=await loadSheetJs();
  const wb=XL.read(new Uint8Array(buf),{type:'array',cellDates:true});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const rows=XL.utils.sheet_to_json(ws,{header:1,defval:''});
  if(rows.length<2){showToast('檔案中沒有找到資料');return 0;}
  const headers=rows[0].map(h=>String(h).trim());
  if(headers.some(h=>/理賠.給付項目/.test(h)))return importInsDetailFormat(rows,headers);
  const colMap=headers.map(h=>xlsxColMap(h));
  let count=0;
  for(let i=1;i<rows.length;i++){
    const row=rows[i];
    if(row.every(v=>!v&&v!==0))continue;
    const ins={id:'ins_'+Date.now()+'_'+i,type:'其他',premFreq:'yearly',premium:0,
      name:'',company:'',policyNo:'',insured:'',startDate:'',endDate:'',renewalDate:'',coverage:'',pdfId:null,pdfName:''};
    colMap.forEach((field,j)=>{
      if(!field||j>=row.length)return;
      const val=row[j];
      if(val===''||val===null||val===undefined)return;
      if(field==='type')ins.type=xlsxTypeMap(val);
      else if(field==='premFreq')ins.premFreq=xlsxFreqMap(val);
      else if(field==='premium')ins.premium=xlsxNum(val);
      else if(field==='startDate'||field==='endDate'||field==='renewalDate')ins[field]=xlsxDate(val);
      else ins[field]=String(val).trim();
    });
    // 組合保障摘要
    const coverageParts=[];
    if(ins.coverageAmt)coverageParts.push(`保額 $${Number(ins.coverageAmt).toLocaleString('zh-TW')}`);
    if(ins.insTypeName)coverageParts.push(ins.insTypeName);
    if(ins.riderType)coverageParts.push(ins.riderType);
    if(ins.premYears)coverageParts.push(`繳費期 ${ins.premYears}`);
    if(coverageParts.length&&!ins.coverage)ins.coverage=coverageParts.join('・');
    // 停效狀態
    if(ins.policyStatus&&!/生效|有效/.test(String(ins.policyStatus)))ins.suspended=true;
    if(!ins.name)ins.name=(ins.company?ins.company+' ':'')+ins.type;
    state.insurances.push(ins);count++;
  }
  if(count>0){save('budget_insurances',state.insurances);showToast(`成功匯入 ${count} 筆保單 ✓`);renderApp();}
  else showToast('未找到有效的保單資料，請確認欄位名稱');
  return count;
}
function parseInsText(text){
  const r={};
  const pno=text.match(/保單號碼[：:﹕]\s*([A-Z0-9\-]{4,20})/)||text.match(/契約編號[：:﹕]\s*([A-Z0-9\-]{4,20})/)||text.match(/保單號[：:]\s*([A-Z0-9\-]{4,20})/);
  if(pno)r.policyNo=pno[1].trim();
  const cos=['國泰人壽','富邦人壽','南山人壽','新光人壽','台灣人壽','中國人壽','遠雄人壽','第一金人壽','三商美邦','全球人壽','安聯人壽','保誠人壽','宏泰人壽','元大人壽','台銀人壽','凱基人壽','富邦產險','國泰產險','新光產險','明台產險'];
  for(const c of cos){if(text.includes(c)){r.company=c;break;}}
  if(!r.company){const m=text.match(/([^\s]{2,6}(?:人壽|產險|保險))/);if(m)r.company=m[1];}
  const prem=text.match(/年繳保費[：:\s]*[NT$]*\s*([\d,，]+)/)||text.match(/每年保費[：:\s]*[NT$]*\s*([\d,，]+)/)||text.match(/保費[：:\s]*[NT$]*\s*([\d,，]+)/);
  if(prem){const v=parseInt(prem[1].replace(/[,，]/g,''));if(v>100)r.premium=v;}
  const dates=[];
  [...text.matchAll(/(\d{2,3})年\s*(\d{1,2})月\s*(\d{1,2})日/g)].slice(0,8).forEach(m=>{
    const roc=parseInt(m[1]),mo=String(m[2]).padStart(2,'0'),dd=String(m[3]).padStart(2,'0');
    const yr=roc<500?roc+1911:roc;
    if(yr>=2000&&yr<=2060)dates.push(`${yr}-${mo}-${dd}`);
  });
  if(dates.length>=1)r.startDate=dates[0];
  if(dates.length>=2)r.endDate=dates[dates.length-1];
  return r;
}

          return`<div style="margin-bottom:12px;display:flex;align-items:center;gap:7px;justify-content:space-between">
            <div style="display:flex;align-items:center;gap:7px;min-width:0">

              <span style="font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat.name}</span>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <span style="font-size:14px;font-weight:800;color:var(--expense)">$${fmt(spent)}</span>
              <span style="font-size:11px;color:var(--text2);margin-left:5px">(${bm==='week'?'週':'月'}預算 $${fmt(cat.budget)} 參考)</span>
            </div>
          </div>`;

      return`<div class="card">

            <button class="stab${bp==='month'?' active':''}" style="padding:5px 12px;font-size:12px" data-a="homeBudgetPeriod" data-v="month">本月</button>
          </div>
        </div>
        ${!sameMode?`<div style="font-size:11px;color:var(--text2);margin-bottom:10px;padding:6px 10px;background:var(--bg);border-radius:8px;border:1px solid var(--border)">
          ℹ️ 你設定的是「${bm==='week'?'週':'月'}預算」，切回「${bm==='week'?'本週':'本月'}」可看完整進度條</div>`:''}
        ${expCats.length>0?catRows:`<div class="empty" style="padding:20px 0"><div class="ei" style="font-size:32px">📋</div><p style="font-size:13px">尚未設定類別預算<br><span style="color:var(--p)">可至「設定 → 類別管理」設定</span></p></div>`}

      <div class="day-nav">

        <span style="font-size:18px;font-weight:700;color:var(--text2)">
          ${dayD.getMonth()+1}月${dayD.getDate()}日
        </span>
        <button class="day-nb" data-a="homeDayNext"${state.homeDayOffset>=0?' disabled':''}>›</button>
      </div>
      ${dayTxs.length>0?dayTxs.map(t=>txItem(t,true,false)).join(''):`<div class="empty" style="padding:24px 0"><div class="ei" style="font-size:36px">📭</div><p>這天沒有記錄</p></div>`}
    </div>
  </div>`;
}

// ── RENDER: ASSETS ─────────────────────────────────────────────────────────
function renderAssetsView(){
  const hide=state.accHideBalance;
  const acsBal=state.accounts.map(a=>({id:a.id,b:accBalance(a.id)}));
  const totalAssets=acsBal.filter(x=>x.b>0).reduce((s,x)=>s+x.b,0);
  const ccDebt=acsBal.filter(x=>x.b<0).reduce((s,x)=>s+Math.abs(x.b),0);
  const loanDebt=state.loans.reduce((s,l)=>s+(l.remainingAmount||0),0);
  const netWorth=totalAssets-ccDebt-loanDebt;
  const tab=(state.assetsTab==='fixed'?'accounts':state.assetsTab)||'accounts';
  const subTabs=[{id:'accounts',lbl:'帳戶'},{id:'loans',lbl:'貸款'}];
  let content='';
  if(tab==='accounts'){
    const types=state.accTypes||DEFAULT_ACC_TYPES;
    const typeGroups=types.map(tp=>{
      const accs=state.accounts.filter(a=>a.type===tp.id);
      if(!accs.length)return'';
      const rows=accs.map(acc=>{
        const bal=accBalance(acc.id);const isCredit=acc.type==='credit';
        const balColor=hide?'var(--text2)':isCredit?(bal<0?'var(--expense)':'var(--income)'):(bal>=0?'var(--income)':'var(--expense)');

        return`<div class="setting-row" style="padding:8px 0">
          <div class="setting-ico" style="width:36px;height:36px;border-radius:10px;font-size:18px;background:var(--bg);border:1px solid var(--border)">${acc.icon}</div>
          <div class="setting-info"><div class="setting-name">${acc.name}</div>
            ${acc.creditLimit>0?`<div class="setting-sub">額度 $${fmt(acc.creditLimit)}</div>`:''}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:19px;font-weight:800;color:${balColor}">${balText}</span>
            <div style="display:flex;gap:4px">
              <button class="icon-btn edit" data-a="editAcc" data-v="${acc.id}">···</button>
              <button class="icon-btn del" data-a="delAcc" data-v="${acc.id}">🗑️</button>
            </div>
          </div>
        </div>`;}).join('');
      return`<div style="font-size:17px;font-weight:900;color:var(--text);padding:0 2px;margin-bottom:6px;margin-top:4px">${tp.name}</div>
      <div class="card" style="margin-bottom:16px">${rows}</div>`;
    }).join('');
    const uncategorized=state.accounts.filter(a=>!types.find(tp=>tp.id===a.type));
    const uncatRows=uncategorized.map(acc=>{
      const bal=accBalance(acc.id);const isCredit=acc.type==='credit';
      const balColor=hide?'var(--text2)':(bal>=0?'var(--income)':'var(--expense)');
      const balText=hide?'* * * *':`$${fmt(bal)}`;
      return`<div class="setting-row" style="padding:8px 0">
        <div class="setting-ico" style="width:36px;height:36px;border-radius:10px;font-size:18px;background:var(--bg);border:1px solid var(--border)">${acc.icon}</div>
        <div class="setting-info"><div class="setting-name">${acc.name}</div></div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:19px;font-weight:800;color:${balColor}">${balText}</span>
          <div style="display:flex;gap:4px">
            <button class="icon-btn edit" data-a="editAcc" data-v="${acc.id}">···</button>
            <button class="icon-btn del" data-a="delAcc" data-v="${acc.id}">🗑️</button>
          </div>
        </div>
      </div>`;}).join('');
    content=`${typeGroups}${uncatRows?`<div class="card" style="margin-bottom:12px">${uncatRows}</div>`:''}

    const loanCards=state.loans.map(l=>`<div class="card" style="margin-bottom:12px">

// ── RENDER: CALENDAR ───────────────────────────────────────────────────────
function renderCalView(){
  const{y,m}=state.calMonth;
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const today=todayStr();
  const txs=monthTxs(y,m);
  const sum=calcSum(txs);
  const dayMap={};
  txs.filter(t=>t.type==='expense').forEach(t=>{
    const d=parseInt(t.date.split('-')[2]);dayMap[d]=(dayMap[d]||0)+t.amount;
  });
  let cells=Array.from({length:first},()=>'<div class="cal-day empty"></div>').join('');
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(ds+'T00:00:00').getDay();
    const isToday=ds===today;const amt=dayMap[d];
    const amtStr=amt?'$'+(amt>=10000?(amt/10000).toFixed(1)+'萬':amt>=1000?(amt/1000).toFixed(1)+'k':String(Math.round(amt))):'';
    cells+=`<div class="cal-day${isToday?' today':''}${amt?' has-exp':''}${dow===0?' sun':dow===6?' sat':''}"
      data-a="openDay" data-v="${ds}">
      <span class="cdn">${d}</span>
      <span class="cda">${amtStr}</span>
    </div>`;
  }
  return`<div class="hdr"><div class="hdr-in">
    <div class="cal-nav">
      <button class="cal-nb" data-a="cprev">‹</button>
      <span class="cal-title-text">${y}年 ${MONTHS[m]}</span>
      <button class="cal-nb" data-a="cnext">›</button>
    </div>
    <div class="sum-bar">
      <div class="sum-item"><div class="lbl">收入</div><div class="val">$${fmt(sum.income)}</div></div>
      <div class="sum-item"><div class="lbl">支出</div><div class="val">$${fmt(sum.expense)}</div></div>
      <div class="sum-item"><div class="lbl">結餘</div>
        <div class="val" style="color:${sum.balance>=0?'#1A7A50':'#B02828'}">$${fmt(sum.balance)}</div>
      </div>
    </div>
  </div></div>
  <div class="content">
    <div class="card">
      <div class="weekdays">${['日','一','二','三','四','五','六'].map(d=>`<div class="wday">${d}</div>`).join('')}</div>
      <div class="cal-grid">${cells}</div>
    </div>
    ${sum.expense>0?`<div class="card" style="margin-top:12px">
      <div class="card-title">本月必要 vs 想要</div>
      <div class="donut-wrap">
        <canvas id="cal-donut" width="120" height="120" style="flex-shrink:0"></canvas>
        <div class="donut-legend">
          <div class="leg-item"><div class="leg-dot" style="background:var(--nec)"></div>

            <span class="leg-lbl">想要</span><span class="leg-val" style="color:var(--want)">$${fmt(sum.want)}</span></div>

function renderSumContent({y,m}){
  const txs=monthTxs(y,m);const sum=calcSum(txs);
  const sr=sum.income>0?Math.round((sum.balance/sum.income)*100):0;
  const wr=sum.expense>0?Math.round((sum.want/sum.expense)*100):0;
  const catMap={};txs.filter(t=>t.type==='expense').forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const top=Object.entries(catMap).sort((a,b)=>b[1]-a[1])[0];
  const insights=[];
  if(!txs.length)insights.push('本月還沒有記錄，快去新增第一筆吧！');
  else{
    if(sum.income===0)insights.push('本月尚未記錄收入，記得把薪資也加進來。');
    else if(sr>=30)insights.push(`太棒了！本月儲蓄率高達 ${sr}%，財務管理非常優秀！`);
    else if(sr>=20)insights.push(`不錯！儲蓄率 ${sr}%，已達 20% 目標。`);
    else if(sr>=0)insights.push(`儲蓄率 ${sr}%，建議目標設在 20% 以上。`);
    else insights.push(`⚠️ 本月超支 $${fmt(-sum.balance)}，要注意控制花費。`);
    if(sum.expense>0){
      if(wr>50)insights.push(`「想要」支出佔 ${wr}%，超過半數為非必要消費，可試著減少衝動購物。`);
      else if(wr>0)insights.push(`「想要」支出佔比 ${wr}%，消費自律做得不錯！`);
    }
    if(top){const cat=getCat('expense',top[0]);insights.push(`最大支出是「${cat.name}」，共 $${fmt(top[1])}，佔總支出 ${Math.round((top[1]/(sum.expense||1))*100)}%。`);}
  }
  return`<div class="card" style="margin-top:0">
    <div class="sum-grid">
      <div class="sum-metric"><div class="ml">總收入</div><div class="mv i">$${fmt(sum.income)}</div></div>
      <div class="sum-metric"><div class="ml">總支出</div><div class="mv e">$${fmt(sum.expense)}</div></div>
      <div class="sum-metric"><div class="ml">結餘</div><div class="mv ${sum.balance>=0?'i':'e'}">$${fmt(sum.balance)}</div></div>
      <div class="sum-metric"><div class="ml">儲蓄率</div><div class="mv p">${sr}%</div></div>
      <div class="sum-metric"><div class="ml">必要支出</div><div class="mv n">$${fmt(sum.nec)}</div></div>
      <div class="sum-metric"><div class="ml">想要購買</div><div class="mv w">$${fmt(sum.want)}</div></div>
    </div>
    ${insights.map(i=>`<div class="insight"><div class="it">💡 分析</div><p>${i}</p></div>`).join('')}
  </div>`;
}

    ...state.accounts.map(a=>({id:'acc:'+a.id,lbl:a.icon+a.name}))];
  let list=[...activeTxs()];
  if(period==='month'){list=list.filter(t=>{const d=new Date(t.date);return d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();});}
  else if(period==='prev'){let pm=now.getMonth()-1,py=now.getFullYear();if(pm<0){pm=11;py--;}list=list.filter(t=>{const d=new Date(t.date);return d.getFullYear()===py&&d.getMonth()===pm;});}
  else if(period==='3m'){const cut=new Date();cut.setMonth(cut.getMonth()-3);list=list.filter(t=>new Date(t.date+'T00:00:00')>=cut);}
  if(state.histFilter==='income')list=list.filter(t=>t.type==='income');
  else if(state.histFilter==='expense')list=list.filter(t=>t.type==='expense');
  else if(state.histFilter==='transfer')list=list.filter(t=>t.type==='transfer');
  else if(state.histFilter==='必要')list=list.filter(t=>t.necessity==='必要');
  else if(state.histFilter==='想要')list=list.filter(t=>t.necessity==='想要');
  else if(state.histFilter.startsWith('acc:'))list=list.filter(t=>t.accountId===state.histFilter.slice(4)||t.fromAccountId===state.histFilter.slice(4)||t.toAccountId===state.histFilter.slice(4));
  const groups={};list.forEach(t=>{(groups[t.date]=groups[t.date]||[]).push(t);});
  const dates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  return`<div class="hdr"><div class="hdr-in">
    <h1>歷史記錄</h1><div class="sub">共 ${list.length} 筆</div>
  </div></div>
  <div class="content">
    <div class="chips" style="margin-bottom:8px">
      ${periods.map(p=>`<div class="chip${period===p.id?' ac':''}" data-a="histPeriod" data-v="${p.id}">${p.lbl}</div>`).join('')}
    </div>
    <div class="chips">${filters.map(f=>
      `<div class="chip${state.histFilter===f.id?' ac':''}" data-a="filt" data-v="${f.id}">${f.lbl}</div>`
    ).join('')}</div>
    ${list.length===0?`<div class="empty"><div class="ei">📭</div><p>沒有符合的記錄</p></div>`:
      dates.map(date=>{
        const dt=groups[date];
        const de=dt.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
        const di=dt.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
        const dd=new Date(date+'T00:00:00');
        const rel=relDate(date);
        return`<div class="day-hdr">
          <span>${dd.getMonth()+1}/${dd.getDate()}</span>
          <span>${di>0?`<span style="color:var(--income)">+$${fmt(di)} </span>`:''}${de>0?`<span style="color:var(--expense)">-$${fmt(de)}</span>`:''}</span>
        </div>
        <div class="card" style="margin-bottom:14px">${dt.map(t=>txItem(t,true,false)).join('')}</div>`;
      }).join('')
    }
  </div>`;
}

function renderYearStatsView(){
  const y=state.statsYear?.y||new Date().getFullYear();
  const yearTxs=state.txs.filter(t=>new Date(t.date).getFullYear()===y&&t.type!=='transfer');
  const yearSum=calcSum(yearTxs);
  const monthlyData=Array.from({length:12},(_,i)=>{
    const mTxs=yearTxs.filter(t=>new Date(t.date).getMonth()===i);
    return{m:i,
      income:mTxs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0),
      expense:mTxs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0)};
  });
  const maxVal=Math.max(...monthlyData.map(d=>Math.max(d.income,d.expense)),1);
  const bars=monthlyData.map(d=>`
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="width:100%;display:flex;align-items:flex-end;justify-content:center;gap:1px;height:70px">
        ${d.income>0?`<div style="width:46%;background:var(--income);border-radius:3px 3px 0 0;height:${Math.round((d.income/maxVal)*70)}px"></div>`:'<div style="width:46%"></div>'}
        ${d.expense>0?`<div style="width:46%;background:var(--expense);border-radius:3px 3px 0 0;height:${Math.round((d.expense/maxVal)*70)}px"></div>`:'<div style="width:46%"></div>'}
      </div>
      <div style="font-size:10px;color:var(--text2);font-weight:700">${d.m+1}</div>
    </div>`).join('');
  const allYears=[...new Set([...state.txs.map(t=>new Date(t.date).getFullYear()),new Date().getFullYear()])].sort().reverse();
  return`<div class="hdr"><div class="hdr-in">
    <div class="hdr-row">
      <div style="display:flex;align-items:center;gap:8px">
        <h1>年份統計</h1>
        <button class="stats-toggle-btn" data-a="statsView" data-v="month">月</button>
        <button class="stats-toggle-btn active" data-a="statsView" data-v="year">年</button>
      </div>
      <select id="stats-year-sel" class="stats-sel">
        ${allYears.map(yr=>`<option value="${yr}" ${y===yr?'selected':''} style="color:#3A2828;background:white">${yr}年</option>`).join('')}
      </select>
    </div>
    <div class="sum-bar">
      <div class="sum-item"><div class="lbl">年收入</div><div class="val">$${fmt(yearSum.income)}</div></div>
      <div class="sum-item"><div class="lbl">年支出</div><div class="val">$${fmt(yearSum.expense)}</div></div>
      <div class="sum-item"><div class="lbl">結餘</div>
        <div class="val" style="color:${yearSum.balance>=0?'#1A7A50':'#B02828'}">$${fmt(yearSum.balance)}</div>
      </div>
    </div>
  </div></div>
  <div class="content">
    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:12px">收支走勢
        <span style="display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--income)"><span style="width:10px;height:10px;background:var(--income);border-radius:2px;display:inline-block"></span>收入</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--expense)"><span style="width:10px;height:10px;background:var(--expense);border-radius:2px;display:inline-block"></span>支出</span>
      </div>
      <div style="display:flex;gap:2px;align-items:flex-end;padding-top:4px">${bars}</div>
    </div>
    <div class="card">
      <div class="card-title">年度摘要</div>
      <div class="sum-grid">
        <div class="sum-metric"><div class="ml">總收入</div><div class="mv i">$${fmt(yearSum.income)}</div></div>
        <div class="sum-metric"><div class="ml">總支出</div><div class="mv e">$${fmt(yearSum.expense)}</div></div>
        <div class="sum-metric"><div class="ml">年結餘</div><div class="mv ${yearSum.balance>=0?'i':'e'}">$${fmt(yearSum.balance)}</div></div>
        <div class="sum-metric"><div class="ml">儲蓄率</div><div class="mv p">${yearSum.income>0?Math.round((yearSum.balance/yearSum.income)*100):0}%</div></div>

function renderInsCardSm(ins){
  const st=insStatus(ins);
  const color=INS_TCOLORS[ins.type]||'#888';
  const isRider=/附約/.test(ins.riderType||'');
  const freqLabel=(INS_FREQS.find(f=>f.id===ins.premFreq)||{label:'年'}).label;
  const isOpen=state.insOpenCov.has(ins.id);

  // 理賠項目：優先用結構化陣列，否則切割文字
  let covItems=[];
  if(ins.coverageItems&&ins.coverageItems.length){
    covItems=ins.coverageItems.map(i=>({label:i.label,val:i.amount||''}));
  }else{
    if(ins.coverageAmt)covItems.push({label:'保障金額',val:`$${fmt(Number(ins.coverageAmt))}`});
    if(ins.coverage)ins.coverage.split(/[、，・,;；\n]+/).map(s=>s.trim()).filter(Boolean).forEach(s=>covItems.push({label:s,val:''}));
  }

  const covHtml=covItems.length?`
    <div class="ins-cov-toggle" data-a="insToggle" data-v="${ins.id}">
      <span>📋 理賠項目（${covItems.length}）</span>
      <span style="display:inline-block;transform:rotate(${isOpen?180:0}deg);transition:transform .2s">▾</span>
    </div>
    ${isOpen?`<div class="ins-cov-body">${covItems.map(item=>`
      <div class="ins-cov-row">
        <div class="ins-cov-dot"></div>
        <span style="flex:1;color:var(--text)">${item.label}</span>
        ${item.val?`<span style="font-weight:800;color:var(--text);white-space:nowrap">${item.val}</span>`:''}
      </div>`).join('')}</div>`:''}`:''  ;

  return`<div class="ins-card-sm" data-ins-id="${ins.id}" style="--ic:${color}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
      <div style="display:flex;align-items:center;gap:6px">
        ${isRider?'<span style="font-size:13px;background:#EEEEF5;color:#666;padding:2px 7px;border-radius:4px;font-weight:700">附約</span>':'<span style="font-size:13px;background:#E8F5EA;color:#3A6840;padding:2px 7px;border-radius:4px;font-weight:700">主約</span>'}
        ${ins.company?`<span style="font-size:13px;color:var(--text2);font-weight:600">${ins.company}</span>`:''}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <span class="ins-badge" style="background:${color}22;color:${color};font-size:13px;padding:3px 8px;margin-bottom:0">${ins.type}</span>
        <span class="ins-drag-handle">⠿</span>
      </div>
    </div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px">
      <div style="font-size:17px;font-weight:800;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">${ins.name||'未命名'}</div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="ins-detail-btn" style="color:var(--expense);border-color:var(--expense)" data-a="delIns" data-v="${ins.id}">🗑️</button>
        <button class="ins-detail-btn" data-a="editIns" data-v="${ins.id}">··· 詳細</button>
      </div>
    </div>
    ${ins.premium?`<div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px">$${fmt(ins.premium)}<span style="font-size:13px;color:var(--text2)">/${freqLabel}</span></div>`:''}
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
      <span class="ins-st ${st.cls}" style="font-size:14px;padding:3px 8px">${st.label}</span>
      ${ins.insured?`<span style="font-size:14px;color:var(--text2);font-weight:600">👤 ${extractPersonName(ins.insured)||ins.insured}</span>`:''}
    </div>
    ${covHtml}
  </div>`;
}
function renderInsView(){
  const total=state.insurances.reduce((s,ins)=>s+insYearlyPremium(ins),0);
  const active=state.insurances.filter(ins=>insStatus(ins).cls==='active').length;
  const alerts=insAlerts();
  const persons=insAllPersons();
  let filtered=state.insurances;
  if(state.insPersonFilter!=='all')filtered=filtered.filter(i=>extractPersonName(i.insured)===state.insPersonFilter);
  if(state.insFilter!=='all')filtered=filtered.filter(i=>i.type===state.insFilter);
  if(state.insCompanyFilter!=='all')filtered=filtered.filter(i=>i.company===state.insCompanyFilter);

  const hdr=`<div class="hdr ins-hdr">
    <div class="hdr-in">
      <div class="hdr-row">
        <div><h1>🛡️ 保險管理</h1>
        <div class="sub">共 ${state.insurances.length} 張保單・${active} 張生效中</div></div>
        <button class="outline-btn" style="background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.5);color:white;font-size:13px;flex-shrink:0" data-a="importIns">📥 匯入 Excel</button>
      </div>
      <div class="ins-total">
        <div class="ins-total-item"><div class="il">年繳總保費</div><div class="iv">$${fmt(total)}</div></div>
        <div class="ins-total-item"><div class="il">月均保費</div><div class="iv">$${fmt(Math.round(total/12))}</div></div>
      </div>
    </div>
  </div>`;

  const alertHtml=alerts.length?`<div style="padding:12px 14px 0">${alerts.map(ins=>`
    <div class="ins-alert">
      <span style="font-size:20px">${INS_TICONS[ins.type]||'📋'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700">${ins.name||ins.company}</div>
        <div style="font-size:12px;color:#8B5E00">${insStatus(ins).label}</div>
      </div>
    </div>`).join('')}</div>`:'';

  // 合併手動成員 + 保單自動偵測（去除重複）
  const savedNames=new Set(state.insMembers.map(m=>m.name));
  const detectedExtra=persons.filter(n=>!savedNames.has(n));
  const allMembers=[
    ...state.insMembers.map(m=>({name:m.name,icon:m.icon,id:m.id})),
    ...detectedExtra.map(n=>({name:n,icon:'👤',id:null})),
  ];
  const personChips=`<div class="chips" style="margin-bottom:6px">
    <button class="chip${state.insPersonFilter==='all'?' ac':''}" data-a="insPersonFilt" data-v="all">👨‍👩‍👧 全家</button>
    ${allMembers.map(m=>`<button class="chip${state.insPersonFilter===m.name?' ac':''}" data-a="insPersonFilt" data-v="${m.name}">${m.icon} ${m.name}${m.id?`<span data-a="editMember" data-v="${m.id}" style="margin-left:4px;opacity:.6;font-size:10px"> ···</span>`:`<span data-a="addDetectedMember" data-v="${m.name}" style="margin-left:4px;opacity:.6;font-size:10px"> ···</span>`}</button>`).join('')}
    <button class="chip" data-a="newMember" style="border-style:dashed;color:var(--text2)">＋ 新增</button>
  </div>`;;
  const chips=`<div class="chips">${['all',...INS_TYPES].map(t=>
    `<button class="chip${state.insFilter===t?' ac':''}" data-a="insFilt" data-v="${t}">${t==='all'?'全部':t}</button>`
  ).join('')}</div>`;
  const companies=[...new Set(state.insurances.map(i=>i.company).filter(Boolean))];
  const companyChips=companies.length>1?`<div class="chips" style="margin-bottom:4px">
    <button class="chip${state.insCompanyFilter==='all'?' ac':''}" data-a="insCompanyFilt" data-v="all">全公司</button>
    ${companies.map(c=>`<button class="chip${state.insCompanyFilter===c?' ac':''}" data-a="insCompanyFilt" data-v="${c}">${c}</button>`).join('')}
  </div>`:'';

  // 依保單號碼分組
  const groups={},ungrouped=[];
  filtered.forEach(ins=>{
    const key=(ins.policyNo||'').trim();
    if(key){
      if(!groups[key])groups[key]={policyNo:key,company:ins.company||'',items:[]};
      groups[key].items.push(ins);
    }else ungrouped.push(ins);
  });
  Object.values(groups).forEach(g=>{
    g.items.sort((a,b)=>(/主約/.test(a.riderType||'')?0:1)-(/主約/.test(b.riderType||'')?0:1));
  });
  const renderGroup=(items,label)=>
    (label?`<div class="ins-group-hdr">📋 ${label}</div>`:'')
    +`<div class="ins-grid">${items.map(ins=>renderInsCardSm(ins)).join('')}</div>`;
  let cards='';
  Object.values(groups).forEach(g=>{
    cards+=`<div class="ins-group">${renderGroup(g.items,`${g.policyNo}${g.company?' · '+g.company:''}`)}</div>`;
  });
  if(ungrouped.length)cards+=`<div class="ins-group">${renderGroup(ungrouped,'')}</div>`;
  if(!filtered.length)cards=`<div class="empty"><div class="ei">🛡️</div><p>尚未新增保單<br><span style="font-size:13px">點下方 + 新增</span></p></div>`;

  return hdr+alertHtml+`<div class="content" style="padding-top:12px">${personChips}${chips}${companyChips}${cards}</div>`+
    `<input type="file" id="ins-import-input" accept=".xlsx,.xls" style="display:none">`+
    `<button class="fab" data-a="newIns">＋</button>`;
}

function txItem(t,showDel,showSign=true){
  if(t.type==='transfer'){
    const fromAcc=getAcc(t.fromAccountId);
    const toAcc=getAcc(t.toAccountId);
    return`<div class="tx-item">
      <div class="tx-ico transfer">🔄</div>
      <div class="tx-info">
        <div class="tx-cat">轉帳${t.note?' · '+t.note:''}</div>
        <div class="tx-meta">
          <span>${fromAcc.icon} ${fromAcc.name} → ${toAcc.icon} ${toAcc.name}</span>
          <span>${relDate(t.date)}</span>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amt" style="color:var(--text2)">$${fmt(t.amount)}</div>
        ${showDel?`<div class="tx-actions"><button class="del-btn" data-a="del" data-id="${t.id}">刪除</button></div>`:''}
      </div>
    </div>`;
  }
  const cat=getCat(t.type,t.category);
  const sub=t.subCategory?getSubCat(cat,t.subCategory):null;
  const acc=getAcc(t.accountId);
  const catLabel=sub?`${cat.name} · ${sub.name}`:cat.name;
  const necTag=t.necessity?`<span class="nec-tag ${t.necessity==='必要'?'n':'w'}">${t.necessity}</span>`:'';
  const accTag=acc.name?`<span class="acc-tag">${acc.icon} ${acc.name}</span>`:'';
  return`<div class="tx-item">
    <div class="tx-ico ${t.type}">${cat.icon}</div>
    <div class="tx-info">
      <div class="tx-cat">${catLabel}${t.note?' · '+t.note:''}</div>
      <div class="tx-meta">${necTag}${accTag}</div>
    </div>
    <div class="tx-right">
      <div class="tx-amt ${t.type}">${showSign?(t.type==='income'?'+':'-'):''}$${fmt(t.amount)}</div>
      ${showDel?`<div class="tx-actions">
        <button class="icon-btn edit" data-a="openEditTx" data-v="${t.id}">···</button>
        <button class="del-btn" data-a="del" data-id="${t.id}">刪除</button>
      </div>`:''}
    </div>
  </div>`;
}

function initInsDragSort(){
  const cards=document.querySelectorAll('.ins-card-sm[data-ins-id]:not([data-drag-init])');
  if(!cards.length)return;
  let dragId=null,ghost=null;
  const moveItem=(fromId,toId)=>{
    const fi=state.insurances.findIndex(i=>i.id===fromId);
    const ti=state.insurances.findIndex(i=>i.id===toId);
    if(fi<0||ti<0||fi===ti)return;
    const[item]=state.insurances.splice(fi,1);
    state.insurances.splice(ti,0,item);
    save('budget_insurances',state.insurances);
    renderApp();
  };
  const clearOver=()=>document.querySelectorAll('.ins-card-sm').forEach(c=>c.classList.remove('ins-drag-over'));
  cards.forEach(card=>{
    card.dataset.dragInit='1';
    // 桌面拖曳
    card.setAttribute('draggable','true');
    card.addEventListener('dragstart',e=>{
      dragId=card.dataset.insId;e.dataTransfer.effectAllowed='move';
      requestAnimationFrame(()=>card.classList.add('ins-dragging'));
    });
    card.addEventListener('dragend',()=>{dragId=null;clearOver();card.classList.remove('ins-dragging');});
    card.addEventListener('dragover',e=>e.preventDefault());
    card.addEventListener('dragenter',e=>{e.preventDefault();clearOver();if(card.dataset.insId!==dragId)card.classList.add('ins-drag-over');});
    card.addEventListener('drop',e=>{e.preventDefault();const to=card.dataset.insId;clearOver();if(dragId&&dragId!==to)moveItem(dragId,to);});
    // 觸控拖曳（手機）
    const handle=card.querySelector('.ins-drag-handle');
    if(!handle)return;
    handle.addEventListener('touchstart',e=>{
      e.preventDefault();
      dragId=card.dataset.insId;
      const r=card.getBoundingClientRect();
      ghost=card.cloneNode(true);
      Object.assign(ghost.style,{position:'fixed',left:r.left+'px',top:r.top+'px',width:r.width+'px',
        zIndex:'9999',opacity:'0.88',pointerEvents:'none',boxShadow:'0 8px 28px rgba(0,0,0,.22)',transform:'scale(1.03)'});
      document.body.appendChild(ghost);card.style.opacity='0.3';
    },{passive:false});
    handle.addEventListener('touchmove',e=>{
      e.preventDefault();if(!ghost)return;
      const t=e.touches[0],gh=ghost.getBoundingClientRect();
      ghost.style.top=(t.clientY-gh.height/2)+'px';ghost.style.left=(t.clientX-gh.width/2)+'px';
      clearOver();ghost.style.visibility='hidden';
      const el=document.elementFromPoint(t.clientX,t.clientY);ghost.style.visibility='';
      const tc=el?.closest('.ins-card-sm[data-ins-id]');
      if(tc&&tc.dataset.insId!==dragId)tc.classList.add('ins-drag-over');
    },{passive:false});
    handle.addEventListener('touchend',e=>{
      if(!ghost){dragId=null;return;}
      const t=e.changedTouches[0];ghost.style.visibility='hidden';
      const el=document.elementFromPoint(t.clientX,t.clientY);
      ghost.remove();ghost=null;
      clearOver();document.querySelectorAll('.ins-card-sm').forEach(c=>c.style.opacity='');
      const tc=el?.closest('.ins-card-sm[data-ins-id]');
      const fid=dragId;dragId=null;
      if(tc&&tc.dataset.insId!==fid)moveItem(fid,tc.dataset.insId);
    });
  });
}

// ── DONUT CHART ─────────────────────────────────────────────────────────────
function drawCatPie(){
  const canvas=document.getElementById('cat-pie');if(!canvas)return;
  const{y,m}=state.statsMonth;
  const txs=monthTxs(y,m);
  const catMap={};txs.filter(t=>t.type==='expense').forEach(t=>{catMap[t.category]=(catMap[t.category]||0)+t.amount;});
  const catArr=Object.entries(catMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const total=catArr.reduce((s,[,v])=>s+v,0);
  const colors=['#C8A5A3','#8090A8','#8DAD93','#C49830','#8B6CC8','#C45555'];
  const ctx=canvas.getContext('2d');const cx=80,cy=80,r=62,lw=24;
  ctx.clearRect(0,0,160,160);
  if(!total){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#E8D8D4';ctx.lineWidth=lw;ctx.stroke();return;}
  let start=0;
  catArr.forEach(([,amt],i)=>{
    const angle=(amt/total)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,r,start-Math.PI/2,start+angle-Math.PI/2);
    ctx.strokeStyle=colors[i%colors.length];ctx.lineWidth=lw;ctx.lineCap='butt';ctx.stroke();
    start+=angle;
  });
  ctx.fillStyle='#3A2828';ctx.font='bold 15px Nunito,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('$'+fmt(total),cx,cy-8);
  ctx.font='12px Nunito,sans-serif';ctx.fillStyle='#907878';ctx.fillText('總支出',cx,cy+11);
}
function drawDonut(canvasId='donut',y,m){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  const _y=y??state.statsMonth.y,_m=m??state.statsMonth.m;
  const sum=calcSum(monthTxs(_y,_m));
  const ctx=canvas.getContext('2d');const cx=60,cy=60,r=44,lw=14;
  ctx.clearRect(0,0,120,120);
  const draw=(start,angle,color)=>{
    if(angle<=0.01)return;
    ctx.beginPath();ctx.arc(cx,cy,r,start-Math.PI/2,start+angle-Math.PI/2);
    ctx.strokeStyle=color;ctx.lineWidth=lw;ctx.lineCap='butt';ctx.stroke();
  };
  if(!sum.expense){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='#E8D8D4';ctx.lineWidth=lw;ctx.stroke();}
  else{
    const na=(sum.nec/sum.expense)*Math.PI*2,wa=(sum.want/sum.expense)*Math.PI*2,ua=Math.PI*2-na-wa;
    draw(0,na,'#8090A8');draw(na,wa,'#B89860');if(ua>0.01)draw(na+wa,ua,'#E8D8D4');
  }
  const wp=sum.expense?Math.round((sum.want/sum.expense)*100):0;
  ctx.fillStyle='#3A2828';ctx.font='bold 18px Nunito,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(wp+'%',cx,cy-8);
  ctx.font='11px Nunito,sans-serif';ctx.fillStyle='#907878';ctx.fillText('想要',cx,cy+10);
}
